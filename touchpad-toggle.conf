# Keyboard event device — either a short name (event2) or a stable full path (/dev/input/by-path/...)
# Find with: cat /proc/bus/input/devices | grep -E "Name|Handlers"
# For a stable path across reboots: ls /dev/input/by-path/ | grep kbd
KEYBOARD_EVENT=event2

# Key code emitted by the touchpad toggle key — find with: sudo evtest <device path from above>
# Press the touchpad toggle key and look for the EV_KEY line (ignore modifiers like KEY_LEFTCTRL)
# Common values: KEY_TOUCHPAD_TOGGLE, KEY_TOUCHPAD_ON (KEY_F22), KEY_F24
TOGGLE_KEY=KEY_F22
