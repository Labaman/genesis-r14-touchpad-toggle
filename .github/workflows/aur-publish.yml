name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set pkgver from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" arch/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" arch/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: genesis-r14-touchpad-toggle
          pkgbuild: ./arch/PKGBUILD
          assets: |
            ./arch/touchpad-toggle.install
          updpkgsums: true
          commit_username: ${{ vars.AUR_USERNAME }}
          commit_email: ${{ vars.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.ref_name }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
